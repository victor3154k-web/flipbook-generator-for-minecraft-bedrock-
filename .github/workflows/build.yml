name: Converter HTML para APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar APK a partir do HTML
        uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: "."       # O ponto indica que o index.html está na raiz
          app-name: "MeuApp"           # Mude para o nome que você quer no celular
          output-folder-path: "output"

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: Aplicativo-APK
          path: output/
