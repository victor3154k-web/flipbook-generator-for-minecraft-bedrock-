name: Converter HTML para APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Correção: Instala a versão correta do Node.js exigida pelo Capacitor
      - name: Configurar Node.js (Versão 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Organizar arquivos para o Build
        run: |
          mkdir pasta_app
          cp index.html pasta_app/

      - name: Criar APK a partir do HTML
        uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: "pasta_app"
          app-name: "MeuApp"
          output-folder-path: "output"

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: Aplicativo-APK
          path: output/
